<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solar XR Mission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

    #introScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        backdrop-filter: brightness(1.1);
    }

    .intro-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        max-width: 800px;
        background: rgba(0, 0, 0, 0.3);
        padding: 80px;
        border-radius: 16px;
        box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
    }

    .intro-text h1 {
        margin: 0;
        font-size: 60px;
        font-family: 'Press Start 2P', cursive;
        color: #ffffff;
        text-shadow:
            1px 1px 0 #2a7ab5,
            2px 2px 0 #2a7ab5,
            3px 3px 0 #2466a0,
            4px 4px 0 #2466a0,
            5px 5px 0 #1c528b,
            6px 6px 0 #1c528b,
            7px 7px 0 #143e76,
            8px 8px 0 #143e76,
            9px 9px 0 #0c2a61,
            10px 10px 0 #0c2a61,
            12px 12px 20px rgba(0, 100, 255, 0.5);
    }

    .intro-text p {
        font-size: 24px;
        margin: 30px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        text-align: center;
    }

    .typing-text {
        overflow: hidden;
        border-right: 2px solid rgba(255, 255, 255, 0.8);
        white-space: nowrap;
        animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        display: inline-block;
        min-width: 0;
    }

    @keyframes typing {
        from { width: 0 }
        to { width: 100% }
    }

    @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: rgba(255, 255, 255, 0.8) }
    }

    button {
        padding: 20px 40px;
        font-size: 18px;
        font-family: 'Space Grotesk', sans-serif;
        border: none;
        background: white;
        color: black;
        cursor: pointer;
        border-radius: 0;
        text-align: center;
        margin: 0 auto;
        display: block;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 0 4px #333333, inset 0 0 0 1px #000000;
    }

    button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
        transition: left 0.5s;
    }

    button:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
        box-shadow: inset 0 0 0 2px black, 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    button:hover::before {
        left: 100%;
    }

    button:active {
        transform: translateY(0);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .audio-controls {
        margin-top: 20px;
    }

    .audio-btn {
        background: transparent;
        border: 2px solid white;
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .audio-btn:hover {
        background: white;
        color: black;
        transform: scale(1.05);
    }
  </style>
</head>
<body>
  <div id="introScreen">
    <div class="intro-content">
        <div class="intro-text">
        <h1>PLANET.HOP</h1>
        <p>
            <span class="typing-text">A SPACE ADVENTURE WITH A CLIMATE MISSION</span>
        </p>
        <button id="launchBtn">LAUNCH</button>
        </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>

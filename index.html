<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Solar XR Mission</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin: 0; overflow: hidden; font-family: 'Space Grotesk', sans-serif; }

    #introScreen {
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 10;
        backdrop-filter: brightness(1.1);
    }

    .intro-content {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 40px;
        max-width: 800px;
        background: rgba(0, 0, 0, 0.3);
        padding: 80px;
        border-radius: 16px;
        box-shadow: 0 6px 30px rgba(0, 0, 0, 0.5);
    }

    .intro-text h1 {
        margin: 0;
        font-size: 60px;
        font-family: 'Press Start 2P', cursive;
        color: #ffffff;
        text-shadow:
            1px 1px 0 #2a7ab5,
            2px 2px 0 #2a7ab5,
            3px 3px 0 #2466a0,
            4px 4px 0 #2466a0,
            5px 5px 0 #1c528b,
            6px 6px 0 #1c528b,
            7px 7px 0 #143e76,
            8px 8px 0 #143e76,
            9px 9px 0 #0c2a61,
            10px 10px 0 #0c2a61,
            12px 12px 20px rgba(0, 100, 255, 0.5);
    }

    .intro-text p {
        font-size: 24px;
        margin: 30px 0;
        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
        text-align: center;
    }

    .typing-text {
        overflow: hidden;
        border-right: 2px solid rgba(255, 255, 255, 0.8);
        white-space: nowrap;
        animation: typing 3.5s steps(40, end), blink-caret 0.75s step-end infinite;
        display: inline-block;
        min-width: 0;
    }

    @keyframes typing {
        from { width: 0 }
        to { width: 100% }
    }

    @keyframes blink-caret {
        from, to { border-color: transparent }
        50% { border-color: rgba(255, 255, 255, 0.8) }
    }

    button {
        padding: 20px 40px;
        font-size: 18px;
        font-family: 'Space Grotesk', sans-serif;
        border: none;
        background: white;
        color: black;
        cursor: pointer;
        border-radius: 0;
        text-align: center;
        margin: 0 auto;
        display: block;
        transition: all 0.3s ease;
        position: relative;
        overflow: hidden;
        box-shadow: inset 0 0 0 4px #333333, inset 0 0 0 1px #000000;
    }

    button::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, rgba(0,0,0,0.1), transparent);
        transition: left 0.5s;
    }

    button:hover {
        background: #f0f0f0;
        transform: translateY(-2px);
        box-shadow: inset 0 0 0 2px black, 0 8px 25px rgba(0, 0, 0, 0.2);
    }

    button:hover::before {
        left: 100%;
    }

    button:active {
        transform: translateY(0);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.15);
    }

    .audio-controls {
        margin-top: 20px;
    }

    .audio-btn {
        background: transparent;
        border: 2px solid white;
        color: white;
        padding: 10px 20px;
        font-size: 14px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .audio-btn:hover {
        background: white;
        color: black;
        transform: scale(1.05);
    }

    /* Planet Hop logo — fixed top-left, shown after LAUNCH */
    #planet-hop-logo {
        position: fixed;
        top: 20px;
        left: 24px;
        z-index: 30;
        display: none;
        font-family: 'Press Start 2P', cursive;
        font-size: 16px;
        color: lightblue;
        letter-spacing: 1px;
        text-shadow:
            0 0 8px rgba(100, 180, 255, 0.6),
            0 0 20px rgba(100, 180, 255, 0.3);
        pointer-events: none;
        user-select: none;
    }

    /* Volume toggle button */
    #volume-btn {
        position: fixed;
        top: 20px;
        right: 20px;
        z-index: 30;
        display: none;
        background: rgba(0, 0, 40, 0.7);
        border: 2px solid lightblue;
        color: lightblue;
        width: 50px;
        height: 50px;
        border-radius: 50%;
        cursor: pointer;
        padding: 8px;
        transition: background 0.2s ease, transform 0.1s ease;
        box-shadow: 0 0 10px rgba(100, 180, 255, 0.3);
    }

    #volume-btn img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
    }

    #volume-btn:hover {
        background: rgba(0, 50, 120, 0.85);
        transform: scale(1.1);
    }

    #volume-btn:active {
        transform: scale(0.95);
    }

    #volume-btn::before {
        display: none;
    }

    /* ─── Mobile responsive ────────────────────────────────────────────── */
    @media (max-width: 768px) {
        .intro-text h1 {
            font-size: 36px;
            text-shadow:
                1px 1px 0 #2a7ab5,
                2px 2px 0 #2a7ab5,
                3px 3px 0 #1c528b,
                5px 5px 10px rgba(0, 100, 255, 0.4);
        }
        .intro-text p { font-size: 18px; margin: 16px 0; }
        .intro-content { padding: 40px 24px; gap: 20px; max-width: 100%; }
        .typing-text { white-space: normal; border-right: none; animation: none; }
        #home-btn { font-size: 15px; padding: 14px 28px; }
    }

    @media (max-width: 480px) {
        .intro-text h1 { font-size: 22px; }
        .intro-text p  { font-size: 14px; }
        .intro-content { padding: 24px 14px; gap: 14px; }
        button         { padding: 14px 24px; font-size: 15px; }
        #home-btn      { font-size: 13px; padding: 12px 20px; }
        #planet-hop-logo { font-size: 12px; top: 14px; left: 16px; }
        #volume-btn    { width: 42px; height: 42px; top: 14px; right: 14px; }
    }

    /* Keep VR button hidden until after LAUNCH (Three.js overrides inline display async) */
    #vr-btn.vr-hidden {
        display: none !important;
    }

    /* Force VR button centering — overrides Three.js VRButton inline styles */
    #vr-btn {
        left: 50% !important;
        transform: translateX(-50%) !important;
        text-align: center !important;
        width: auto !important;
        min-width: 160px;
    }

    /* Return Home button — shown on result screen, sits just below the result textbox */
    #home-btn {
        position: fixed;
        top: 78%;
        left: 50%;
        transform: translateX(-50%);
        z-index: 20;
        display: none;
        padding: 20px 48px;
        font-size: 18px;
        font-family: 'Space Grotesk', sans-serif;
        letter-spacing: 1px;
    }

    /* Fade to black scene transition */
    #scene-fade {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: black;
        opacity: 0;
        pointer-events: none;
        z-index: 40;
        transition: opacity 0.5s ease;
    }

    #scene-fade.black {
        opacity: 1;
    }

    /* Hyperspace launch transition */
    #hyperspace {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        z-index: 50;
        pointer-events: none;
        opacity: 0;
        background: radial-gradient(ellipse at center,
            #ffffff 0%,
            #aaddff 12%,
            #2266ee 35%,
            #000820 65%,
            #000000 100%
        );
        transform-origin: center center;
    }

    #hyperspace.active {
        animation: hyperspace-flash 0.9s ease-out forwards;
    }

    @keyframes hyperspace-flash {
        0%   { opacity: 0;   transform: scale(0.05); }
        18%  { opacity: 1;   transform: scale(1); }
        55%  { opacity: 0.85; transform: scale(1.3); }
        100% { opacity: 0;   transform: scale(2.5); }
    }
  </style>
</head>
<body>
  <div id="planet-hop-logo">PLANET.HOP</div>
  <button id="volume-btn" title="Toggle sound"><img src="/textures/audio_on.png" alt="Sound on" /></button>
  <button id="home-btn">⟵ RETURN HOME</button>
  <div id="scene-fade"></div>
  <div id="hyperspace"></div>
  <div id="introScreen">
    <div class="intro-content">
        <div class="intro-text">
        <h1>PLANET.HOP</h1>
        <p>
            <span class="typing-text">A SPACE ADVENTURE WITH A CLIMATE MISSION</span>
        </p>
        <button id="launchBtn">LAUNCH</button>
        </div>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
